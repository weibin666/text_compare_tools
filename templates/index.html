<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本对比工具</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      max-width: 960px; margin: 32px auto; padding: 0 16px; color: #222; background: #f7f8fa; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { flex: 1; min-width: 120px; padding: 10px; text-align: center; cursor: pointer;
      border: 1px solid #d0d4da; border-radius: 8px; background: #fafbfc; font-size: 14px; }
    .tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .pane { display: none; }
    .pane.active { display: block; }
    label { display: block; margin: 14px 0 6px; font-size: 14px; font-weight: 600; }
    input[type=file], input[type=text], select {
      width: 100%; padding: 9px; border: 1px solid #d0d4da; border-radius: 6px; font-size: 14px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 140px; }
    .pair { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    .pair input { flex: 1; }
    .pair .rm { flex: 0 0 auto; width: 34px; padding: 8px 0; background: #fee2e2; color: #b91c1c;
      border: 1px solid #fecaca; border-radius: 6px; cursor: pointer; font-weight: 700; }
    .addpair { margin-top: 4px; padding: 6px 12px; font-size: 13px; background: #eef2ff;
      color: #3730a3; border: 1px dashed #a5b4fc; border-radius: 6px; cursor: pointer; width: auto; }
    button.go { margin-top: 20px; width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
      color: #fff; background: #2563eb; border: none; border-radius: 8px; cursor: pointer; }
    button.go:disabled { background: #93b4f5; cursor: not-allowed; }
    .hint { font-size: 12px; color: #888; font-weight: 400; margin-top: 4px; }
    fieldset { margin-top: 18px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; }
    legend { font-size: 13px; font-weight: 600; color: #555; padding: 0 6px; }
    .opts { display: flex; gap: 18px 24px; flex-wrap: wrap; align-items: center; }
    .opts label { display: inline-flex; align-items: center; gap: 6px; margin: 4px 0; font-weight: 400; }
    .opts input[type=checkbox] { width: auto; }
    .opts select { width: auto; }
    #result { margin-top: 20px; padding: 16px; border-radius: 8px; display: none; }
    #result.err { background: #fef2f2; border: 1px solid #fecaca; }
    #result.ok { background: #fff; border: 1px solid #e5e7eb; }
    .dlbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .dl { display: inline-block; padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: 600; }
    .dl.x { background: #16a34a; color: #fff; }
    .dl.h { background: #2563eb; color: #fff; }
    .section { margin-top: 18px; border-top: 1px solid #eee; padding-top: 12px; }
    .section h3 { font-size: 15px; margin: 0 0 8px; }
    .stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 8px; }
    .stat b { font-size: 18px; color: #2563eb; }
    .legend { font-size: 12px; color: #666; margin-bottom: 8px; }
    .legend .d { color: #d11; font-weight: 600; }
    .legend .i { color: #080; font-weight: 600; }
    table.preview { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.preview th, table.preview td { border: 1px solid #e5e7eb; padding: 6px 8px;
      vertical-align: top; text-align: left; word-break: break-word; }
    table.preview th { background: #f3f4f6; position: sticky; top: 0; }
    .wrap { max-height: 420px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 6px; }
    td.num { text-align: center; color: #999; width: 44px; }
    td.sim { text-align: center; width: 60px; }
  </style>
</head>
<body>
  <h1>📝 文本对比工具</h1>
  <p class="hint">逐行对比文本，不同字符高亮（<span style="color:#d11">红=删除/缺失</span>，<span style="color:#080">绿=新增</span>），在线预览并导出 Excel / HTML·PDF 报告。</p>
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-mode="txt">两个 txt</div>
      <div class="tab" data-mode="excel">单个 Excel/CSV（可多列）</div>
      <div class="tab" data-mode="two_excel">两个 Excel/CSV</div>
      <div class="tab" data-mode="jsonl">jsonl</div>
    </div>

    <form id="form">
      <input type="hidden" name="mode" id="mode" value="txt">

      <div class="pane active" data-pane="txt">
        <label>文本文件 1</label><input type="file" name="txt1" accept=".txt">
        <label>文本文件 2</label><input type="file" name="txt2" accept=".txt">
        <p class="hint">两个文件行数一一对应，逐行对比。</p>
      </div>

      <div class="pane" data-pane="excel">
        <label>Excel / CSV 文件</label>
        <input type="file" name="excel" accept=".xlsx,.xlsm,.csv">
        <p class="hint">第一行为表头。可添加多对列名，一次对比多列（每对输出一个 sheet）。</p>
        <label>要对比的列对</label>
        <div id="excel-pairs">
          <div class="pair">
            <input type="text" name="excel_col_a" placeholder="列名 A，如 src">
            <input type="text" name="excel_col_b" placeholder="列名 B，如 mt">
            <button type="button" class="rm" title="删除">×</button>
          </div>
        </div>
        <button type="button" class="addpair" data-target="excel-pairs"
          data-a="excel_col_a" data-b="excel_col_b">＋ 添加列对</button>
      </div>

      <div class="pane" data-pane="two_excel">
        <div class="row">
          <div><label>文件 1（Excel/CSV）</label><input type="file" name="excel1" accept=".xlsx,.xlsm,.csv"></div>
          <div><label>文件 2（Excel/CSV）</label><input type="file" name="excel2" accept=".xlsx,.xlsm,.csv"></div>
        </div>
        <div class="row">
          <div><label>文件 1 的列名</label><input type="text" name="col1" placeholder="如 译文"></div>
          <div><label>文件 2 的列名</label><input type="text" name="col2" placeholder="如 译文"></div>
        </div>
        <p class="hint">两个文件按行号对应，分别取各自的一列对比。</p>
      </div>

      <div class="pane" data-pane="jsonl">
        <label>jsonl 文件</label>
        <input type="file" name="jsonl" accept=".json,.jsonl,.txt">
        <p class="hint">每行一个 json，如 {"src":"...","mt":"..."}。可添加多对字段名。</p>
        <label>要对比的字段对</label>
        <div id="json-pairs">
          <div class="pair">
            <input type="text" name="json_key_a" value="src">
            <input type="text" name="json_key_b" value="mt">
            <button type="button" class="rm" title="删除">×</button>
          </div>
        </div>
        <button type="button" class="addpair" data-target="json-pairs"
          data-a="json_key_a" data-b="json_key_b">＋ 添加字段对</button>
      </div>

      <fieldset>
        <legend>对比选项</legend>
        <div class="opts">
          <label>粒度
            <select name="granularity">
              <option value="char">字符级（适合中文）</option>
              <option value="word">词级（适合英文）</option>
            </select>
          </label>
          <label><input type="checkbox" name="ignore_case" value="1"> 忽略大小写</label>
          <label><input type="checkbox" name="ignore_ws" value="1"> 忽略空白</label>
          <label><input type="checkbox" name="ignore_punct" value="1"> 忽略标点</label>
          <label><input type="checkbox" name="only_diff" value="1"> 只导出有差异的行</label>
        </div>
      </fieldset>

      <button type="submit" class="go" id="submit">开始对比</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const panes = document.querySelectorAll('.pane');
    const modeInput = document.getElementById('mode');
    tabs.forEach(tab => tab.addEventListener('click', () => {
      const mode = tab.dataset.mode;
      tabs.forEach(t => t.classList.toggle('active', t === tab));
      panes.forEach(p => p.classList.toggle('active', p.dataset.pane === mode));
      modeInput.value = mode;
    }));

    // 动态增删列对/字段对
    document.querySelectorAll('.addpair').forEach(btn => btn.addEventListener('click', () => {
      const box = document.getElementById(btn.dataset.target);
      const div = document.createElement('div');
      div.className = 'pair';
      div.innerHTML = `<input type="text" name="${btn.dataset.a}" placeholder="A">
        <input type="text" name="${btn.dataset.b}" placeholder="B">
        <button type="button" class="rm" title="删除">×</button>`;
      box.appendChild(div);
    }));
    document.addEventListener('click', e => {
      if (e.target.classList.contains('rm')) {
        const box = e.target.closest('.pair').parentElement;
        if (box.querySelectorAll('.pair').length > 1) e.target.closest('.pair').remove();
      }
    });

    const form = document.getElementById('form');
    const result = document.getElementById('result');
    const submit = document.getElementById('submit');

    function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

    function sectionHtml(s, showTitle) {
      const rows = s.preview.map(r => `
        <tr><td class="num">${r.idx}</td>
        <td>${r.a_html || '<span style="color:#bbb">（空）</span>'}</td>
        <td>${r.b_html || '<span style="color:#bbb">（空）</span>'}</td>
        <td class="sim">${r.sim}%</td></tr>`).join('');
      const more = s.total > s.preview.length
        ? `<p class="hint">仅预览前 ${s.preview.length} 行，完整结果请下载。</p>` : '';
      const title = showTitle ? `<h3>${escapeHtml(s.title || '')}</h3>` : '';
      return `<div class="section">${title}
        <div class="stats">
          <div class="stat">总行数<br><b>${s.total}</b></div>
          <div class="stat">差异行<br><b>${s.diff_count}</b></div>
          <div class="stat">平均相似度<br><b>${s.avg_similarity}%</b></div>
        </div>${more}
        <div class="wrap"><table class="preview">
          <thead><tr><th>行</th><th>${escapeHtml(s.header_a)}</th><th>${escapeHtml(s.header_b)}</th><th>相似度</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="4">没有可显示的行。</td></tr>'}</tbody>
        </table></div></div>`;
    }

    function render(d) {
      const multi = d.sections.length > 1;
      const dl = `<div class="dlbar">
        <a class="dl x" href="${d.download_url}">⬇️ 下载高亮 Excel</a>
        <a class="dl h" href="${d.report_url}" target="_blank">📄 打开报告（HTML / 存为 PDF）</a></div>`;
      const legend = `<div class="legend"><span class="d">红 = 删除/缺失</span> ＆ <span class="i">绿 = 新增</span></div>`;
      return dl + legend + d.sections.map(s => sectionHtml(s, multi)).join('');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submit.disabled = true; submit.textContent = '处理中…';
      result.style.display = 'none';
      try {
        const resp = await fetch('/diff', { method: 'POST', body: new FormData(form) });
        const data = await resp.json();
        if (data.ok) { result.className = 'ok'; result.innerHTML = render(data); }
        else { result.className = 'err'; result.innerHTML = '❌ ' + escapeHtml(data.error); }
      } catch (err) {
        result.className = 'err'; result.textContent = '❌ 请求失败：' + err;
      } finally {
        result.style.display = 'block';
        submit.disabled = false; submit.textContent = '开始对比';
      }
    });
  </script>
</body>
</html>
