services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - MAX_UPLOAD_MB=50
      - RESULT_TTL=1800
      - RATE_LIMIT=30
      - TRUST_PROXY=1
    volumes:
      - results:/app/results
    # 不直接对外暴露，由 nginx 反代

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  results:
